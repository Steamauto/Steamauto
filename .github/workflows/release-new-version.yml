name: Publish New Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 5.0.1)'
        required: true
      changelog:
        description: 'Changelog text'
        required: true
      level:
        description: 'Release level(Only stable is supported now)'
        default: 'stable'
        required: true
        type: choice
        options:
          - stable
          - beta
          - alpha
      significance:
        description: 'Significance level'
        default: 'normal'
        required: true
        type: choice
        options:
          - minor
          - normal
          - important
          - critical

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ github.event.inputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate version format
        run: |
          if [[ ! "${{ github.event.inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version format"
            exit 1
          fi

      - name: Update files
        run: |
          python .github/scripts/update_files.py \
            --version "${{ github.event.inputs.version }}" \
            --changelog "${{ github.event.inputs.changelog }}" \
            --level "${{ github.event.inputs.level }}" \
            --significance "${{ github.event.inputs.significance }}"

      - name: Upload modified files
        uses: actions/upload-artifact@v4
        with:
          name: config-files
          path: |
            utils/static.py
            public.json
          retention-days: 3

  build:
    needs: prepare
    strategy:
      matrix:
        os: [windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download config files
        uses: actions/download-artifact@v4
        with:
          name: config-files
          path: .

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Validate version files
        shell: bash
        run: |
          python - <<'PY'
          import json
          import pathlib
          import re

          expected = "${{ github.event.inputs.version }}"
          static_text = pathlib.Path("utils/static.py").read_text(encoding="utf-8")
          match = re.search(r'CURRENT_VERSION\s*=\s*["\']([^"\']+)["\']', static_text)
          if not match:
              raise SystemExit("CURRENT_VERSION not found in utils/static.py")

          static_version = match.group(1)
          public_data = json.loads(pathlib.Path("public.json").read_text(encoding="utf-8"))
          public_version = public_data["versions"][0]["version"] if public_data.get("versions") else None

          print(f"expected={expected}")
          print(f"utils/static.py={static_version}")
          print(f"public.json={public_version}")

          if static_version != expected:
              raise SystemExit(f"utils/static.py version mismatch: expected {expected}, got {static_version}")
          if public_version != expected:
              raise SystemExit(f"public.json version mismatch: expected {expected}, got {public_version}")
          PY

      - name: Install UPX (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          $url = "https://github.com/upx/upx/releases/download/v5.0.0/upx-5.0.0-win64.zip"
          $output = "upx.zip"
          Invoke-WebRequest -Uri $url -OutFile $output
          Expand-Archive -Path $output -DestinationPath C:\upx_temp
          New-Item -ItemType Directory -Path C:\upx -Force
          Move-Item C:\upx_temp\upx-5.0.0-win64\* C:\upx -Force
          Remove-Item C:\upx_temp, $output -Recurse -Force

      - name: Install requirements and build
        shell: bash
        env:
          MATRIX_OS: ${{ matrix.os }}
        run: |
          pip install pyinstaller
          pip install -r requirements.txt
          python .github/scripts/add_build_info.py

          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            pyinstaller build.spec --upx-dir C:\\upx
          else
            pyinstaller build.spec
          fi

      - name: Check build result
        if: ${{ failure() }}
        run: |
          echo "Build failed on ${{ matrix.os }}"
          exit 1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: dist/
          retention-days: 3

  publish:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: release_files
          merge-multiple: true

      - name: Prepare release files
        run: |
          test -n "$(find release_files -maxdepth 1 -type f -print -quit)" || {
            echo "No release files were downloaded into release_files/"
            exit 1
          }
          ls -lah release_files

      - name: Prepare release body
        run: |
          echo -e "${{ github.event.inputs.changelog }}" > release_body.md

      - name: Create Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          bodyFile: release_body.md
          artifacts: release_files/*
          token: ${{ secrets.GITHUB_TOKEN }}
          prerelease: ${{ github.event.inputs.level != 'stable' }}

  finalize:
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download config files
        uses: actions/download-artifact@v4
        with:
          name: config-files
          path: .

      - name: Update metadata
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python .github/scripts/update_metadata.py \
            --version "${{ github.event.inputs.version }}" \
            --repo "${{ github.repository }}"

      - name: Process message
        id: process-message
        run: |
          # 将 \n 替换为实际的换行符
          processed_message=$(echo "${{ github.event.inputs.changelog }}" | sed 's/\\n/\n/g')
          # 将处理后的消息存储到环境变量中
          echo "MESSAGE<<EOF" >> $GITHUB_ENV
          echo "$processed_message" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Commit changes
        uses: EndBug/add-and-commit@v9
        env:
          COMMIT_MESSAGE: ${{ env.MESSAGE }}
        with:
          add: utils/static.py public.json
          message: "${{ env.COMMIT_MESSAGE }}"
          default_author: github_actions
